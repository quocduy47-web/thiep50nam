<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kỷ Niệm 50 Năm</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#222,#550000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.card{

width:420px;
height:300px;
background:#111;
border-radius:15px;
box-shadow:0 0 40px red;
text-align:center;
padding:30px;
cursor:pointer;
transition:1s;

}

.card.open{
transform:scale(1.05);
box-shadow:0 0 80px red;
}

.title{
font-size:30px;
color:#ff2a2a;
margin-top:10px;
}

.text{
margin-top:20px;
font-size:18px;
line-height:1.6;
}

.button{

margin-top:20px;
padding:10px 25px;
background:red;
border:none;
border-radius:8px;
color:white;
font-size:18px;
cursor:pointer;

}

.countdown{

margin-top:20px;
font-size:20px;
color:#ffd700;

}

.qr{

margin-top:20px;
width:120px;

}

.firework{

position:absolute;
width:6px;
height:6px;
background:red;
border-radius:50%;
animation:fire 1s linear forwards;

}

@keyframes fire{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-300px);
opacity:0;
}

}

.footer{

margin-top:15px;
font-size:14px;
color:#ccc;

}

</style>

</head>

<body>

<div class="card" onclick="openCard()" id="card">

<div class="title">

KỶ NIỆM 50 NĂM

</div>

<div class="text" id="message">

Bấm để mở thiệp 🎉

</div>

<button class="button">

MỞ THIỆP

</button>

<div class="countdown" id="countdown"></div>

<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=tham-du-su-kien">

<div class="footer">

26 / 03 / 1976 – 26 / 03 / 2026

</div>

</div>

<audio id="music">

<source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Scott_Holmes/Corporate__Motivational_Music/Scott_Holmes_-_01_-_Our_Big_Adventure.mp3">

</audio>

<script>

function openCard(){

document.getElementById("card").classList.add("open")

document.getElementById("message").innerHTML=

"Trân trọng kính mời quý đại biểu<br>về tham dự lễ kỷ niệm<br><b>50 năm thành lập</b><br>Vào lúc 7h30 ngày 26/03/2026"

document.getElementById("music").play()

fireworks()

}

function fireworks(){

for(let i=0;i<80;i++){

let f=document.createElement("div")

f.className="firework"

f.style.left=Math.random()*window.innerWidth+"px"

f.style.top=Math.random()*window.innerHeight+"px"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},1000)

}

}

function countdown(){

let target=new Date("Mar 26, 2026 07:30:00").getTime()

let now=new Date().getTime()

let distance=target-now

let d=Math.floor(distance/(1000*60*60*24))

let h=Math.floor((distance%(1000*60*60*24))/(1000*60*60))

let m=Math.floor((distance%(1000*60*60))/(1000*60))

let s=Math.floor((distance%(1000*60))/1000)

document.getElementById("countdown").innerHTML=

"⏳ Còn "+d+" ngày "+h+" giờ "+m+" phút "+s+" giây"

}

setInterval(countdown,1000)

</script>

</body>

</html>
